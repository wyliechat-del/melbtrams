<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Melbourne Trams</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --font-ui: 'Space Grotesk', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-ui); }
  /* iOS Safari safe area support */
  html { height: -webkit-fill-available; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; min-height: -webkit-fill-available; }

  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 52px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    z-index: 1000;
  }
  #topbar .logo { display: flex; align-items: center; gap: 10px; }
  #topbar .logo-icon {
    width: 28px; height: 28px; background: var(--accent);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: #0b0f1a; flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  #topbar .subtitle { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  #status-group { display: flex; align-items: center; gap: 12px; }
  #live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--font-mono); color: var(--green);
  }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

  #tram-count-badge {
    font-family: var(--font-mono); font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 20px; color: var(--accent);
  }

  #clock { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  /* ── Main content ── */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  #sidebar-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); font-family: var(--font-mono);
  }

  #route-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  #route-list::-webkit-scrollbar { width: 4px; }
  #route-list::-webkit-scrollbar-track { background: transparent; }
  #route-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .route-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px; cursor: pointer; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .route-item:hover { background: var(--surface2); }
  .route-item.active { background: var(--surface2); border-left-color: var(--color); }
  .route-item.dimmed { opacity: 1; }

  .route-num {
    width: 32px; height: 20px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; font-family: var(--font-mono);
    flex-shrink: 0; color: #fff;
  }
  .route-name { font-size: 12px; color: var(--text); flex: 1; line-height: 1.3; }

  /* Toggle switch */
  .route-toggle {
    flex-shrink: 0; width: 28px; height: 16px; border-radius: 8px;
    background: var(--muted); position: relative; transition: background 0.2s;
    cursor: pointer;
  }
  .route-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%; background: #fff;
    transition: transform 0.2s;
  }
  .route-item:not(.dimmed) .route-toggle { background: var(--color); }
  .route-item:not(.dimmed) .route-toggle::after { transform: translateX(12px); }
  .route-tram-count {
    font-size: 10px; font-family: var(--font-mono); color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 10px; min-width: 24px; text-align: center;
  }

  #sidebar-footer {
    padding: 10px 14px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted); font-family: var(--font-mono);
    line-height: 1.6;
  }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Schematic panel ── */
  #schematic-panel {
    display: none; flex: 1; position: relative; overflow: hidden;
    background: #f5f0e8; cursor: grab;
  }
  #schematic-panel.active { display: block; }
  #schematic-panel:active { cursor: grabbing; }
  #schematic-img-wrap {
    position: absolute; transform-origin: 0 0;
    user-select: none; -webkit-user-select: none;
  }
  #schematic-img-wrap img {
    display: block; width: 2301px; height: 2500px;
    pointer-events: none; user-select: none;
  }
  #schematic-markers {
    position: absolute; top: 0; left: 0;
    width: 2301px; height: 2500px; pointer-events: none;
  }
  .schematic-tram {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px; font-weight: 700; font-family: 'DM Mono', monospace;
    font-size: 11px; color: #fff; border: 2px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 6px rgba(0,0,0,0.5); pointer-events: all;
    cursor: pointer; width: 26px; height: 18px;
    transition: transform 0.2s;
  }
  .schematic-tram:hover { transform: translate(-50%,-50%) scale(1.3); z-index: 999; }
  .schematic-tram.selected { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.4); transform: translate(-50%,-50%) scale(1.4); }

  /* ── Bottom bar (mobile) ── */
  #bottombar {
    display: none;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 10px 8px; gap: 6px; flex-direction: column;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    z-index: 1000; flex-shrink: 0;
  }
  #mobile-controls {
    display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
  }
  #mobile-map-btns, #mobile-all-btns { display: flex; gap: 4px; }
  .mobile-map-btn, .mobile-all-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 10px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; cursor: pointer;
    white-space: nowrap;
  }
  .mobile-map-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .mobile-all-btn { color: var(--text); }
  #mobile-tram-count { margin-left: auto; }

  /* ── Info panel (floating) ── */
  #info-panel {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 18px;
    font-size: 13px; z-index: 2000; min-width: 280px; max-width: 380px;
    display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
  }
  #info-panel.visible { display: block; }
  #info-close {
    position: absolute; top: 8px; right: 12px;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; line-height: 1;
  }
  .info-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
  .info-label { font-size: 10px; font-family: var(--font-mono); color: var(--muted); width: 70px; flex-shrink: 0; }
  .info-value { font-size: 13px; color: var(--text); }
  .info-route-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 22px; border-radius: 5px;
    font-weight: 700; font-size: 13px; font-family: var(--font-mono); color: #fff;
    margin-right: 6px;
  }

  /* ── Refresh button ── */
  #refresh-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent); padding: 5px 12px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 11px; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  #refresh-btn:hover { background: rgba(56,189,248,0.1); }
  #refresh-btn.spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error banner ── */
  #error-banner {
    display: none; padding: 8px 16px; background: rgba(248,113,113,0.15);
    border-bottom: 1px solid rgba(248,113,113,0.3);
    font-size: 12px; color: var(--red); font-family: var(--font-mono);
    text-align: center; z-index: 999;
  }

  /* ── Leaflet overrides ── */
  .leaflet-container { background: #0d1220; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution {
    background: rgba(11,15,26,0.7) !important; color: var(--muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--muted) !important; }

  .tram-marker {
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px; font-weight: 700; font-family: 'DM Mono', monospace;
    font-size: 10px; color: #fff; border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6); cursor: pointer;
    transition: transform 0.2s;
  }
  .tram-marker:hover { transform: scale(1.3); z-index: 9999 !important; }
  .tram-marker.selected {
    border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
    transform: scale(1.4); z-index: 9999 !important;
  }

  /* ── Mobile responsive ── */
  @media (max-width: 640px) {
    #sidebar { display: none; }
    #bottombar { display: flex; }
    #info-panel { bottom: 80px; left: 10px; right: 10px; transform: none; min-width: unset; max-width: unset; }
  }

  /* ── Route group headers ── */
  .route-group-header {
    padding: 8px 14px 4px;
    font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase;
    color: #DCDCDC; font-family: var(--font-mono);
    border-top: 1px solid var(--border); margin-top: 4px;
  }
  .route-group-header:first-child { border-top: none; margin-top: 0; }

  /* mobile pills */
  .mobile-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 22px; border-radius: 5px;
    font-weight: 700; font-size: 11px; font-family: var(--font-mono);
    color: #fff; cursor: pointer; opacity: 1; transition: opacity 0.2s;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .mobile-pill.dimmed { background: #4a5568 !important; opacity: 0.7; }

  #mobile-tram-count {
    font-family: var(--font-mono); font-size: 11px; color: var(--accent);
    margin-left: auto;
  }

  .sidebar-section { border-bottom: 1px solid var(--border); }
  .sidebar-section-label {
    padding: 10px 14px 6px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #DCDCDC; font-family: var(--font-mono);
  }

  .map-type-btn {
    flex: 1; padding: 7px 0; border-radius: 6px; font-size: 12px; font-weight: 500;
    font-family: var(--font-ui); cursor: pointer; transition: all 0.15s;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  }
  .map-type-btn.active {
    background: var(--accent); border-color: var(--accent); color: #0b0f1a;
  }

  .all-btn {
    flex: 1; padding: 5px 0; border-radius: 6px; font-size: 11px;
    font-family: var(--font-mono); cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    transition: background 0.15s;
  }
  .all-btn:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">T</div>
      <div>
        <div style="display:flex;align-items:baseline;gap:8px;">
          <h1>Melbourne Trams</h1>
          <span class="subtitle">LIVE</span>
        </div>
      </div>
    </div>
    <div id="status-group">
      <div id="live-badge"><div class="pulse"></div><span id="status-text">Connecting...</span></div>
      <div id="tram-count-badge">— trams</div>
      <div id="clock">--:--:--</div>
      <button id="refresh-btn" onclick="fetchTrams()">↻ Refresh</button>
    </div>
  </div>

  <div id="error-banner" id="error-banner"></div>

  <div id="main">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-label">Map Type</div>
        <div style="display:flex;gap:6px;padding:0 14px 10px;">
          <button id="btn-street" class="map-type-btn active" onclick="setMapMode('street')">Street</button>
          <button id="btn-transit" class="map-type-btn" onclick="setMapMode('transport')">Transit</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Routes</div>
        <div style="display:flex;gap:6px;padding:0 14px 8px;">
          <button class="all-btn" onclick="setAllRoutes(true)">All On</button>
          <button class="all-btn" onclick="setAllRoutes(false)">All Off</button>
        </div>
      </div>
      <div id="route-list"></div>
      <div id="sidebar-footer">
        Data: Transport Victoria<br>
        CC BY 4.0 · Refresh: 30s<br>
        <span id="last-updated">—</span>
      </div>
    </div>
    <div id="map"></div>
    <div id="schematic-panel">
      <div id="schematic-img-wrap">
        <img src="Tram-Map-2021.png" alt="Melbourne Tram Network" draggable="false">
        <div id="schematic-markers"></div>
      </div>
    </div>
  </div>

  <div id="bottombar">
    <div id="mobile-controls">
      <div id="mobile-map-btns">
        <button class="mobile-map-btn active" id="mb-street" onclick="setMapMode('street')">Street</button>
        <button class="mobile-map-btn" id="mb-transit" onclick="setMapMode('transport')">Transit</button>
      </div>
      <div id="mobile-all-btns">
        <button class="mobile-all-btn" onclick="setAllRoutes(true)">All On</button>
        <button class="mobile-all-btn" onclick="setAllRoutes(false)">All Off</button>
      </div>
      <div id="mobile-tram-count">— trams</div>
    </div>
    <div id="mobile-pills"></div>
  </div>
</div>

<div id="info-panel">
  <button id="info-close" onclick="closeInfo()">×</button>
  <div id="info-content"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  ).addTo(map);
  ftz.bindTooltip('Free Tram Zone', { permanent: false, direction: 'center', className: 'ftz-tooltip' });

  loadAndDrawRoutes();
}

const TPS_PTS = [[-37.7138,144.8906],[-37.7688,144.878],[-37.8014,144.9009],[-37.7276,144.9636],[-37.7448,144.9777],[-37.7292,144.9916],[-37.6797,145.0695],[-37.7947,145.0846],[-37.8178,145.1221],[-37.824,145.0576],[-37.8376,145.1104],[-37.8564,145.1821],[-37.9142,145.0169],[-37.8939,145.0558],[-37.8688,144.98],[-37.8471,144.9487],[-37.8408,144.9328],[-37.8214,144.9421],[-37.8144,144.9384],[-37.8183,144.9671],[-37.7993,144.9642]];
const TPS_WX = [11498.818147163990,224.399106055865,36655.998711628665,-33995.751757877900,-116798.203297909540,109463.644375982880,6497.892932258214,-53782.885641859284,19111.352053833863,85075.789756260940,-2679.038836300908,-18679.994312377625,74187.114451784520,-44634.436728612345,-131734.446827693170,236319.062527223800,82182.271166640930,-829934.692134956700,354121.055551088600,114160.248111358920,102741.802646306550,-665033.878475126300,-3624.271332304317,3652.099018557254];
const TPS_WY = [5739.833480413610,1005.009903315788,1098.298335776956,28001.787362825480,-20671.455434395770,4789.020281953652,12380.117659361616,24053.225982149550,-80039.809171071630,-44270.603790285335,71687.559537257040,7911.522857607301,-45545.211083696030,26506.205513890087,13232.158481175557,-87817.976719566780,95193.257006687800,564991.691326913400,-575320.486839036000,50437.731256369700,-53361.875947646105,-24255.089719776926,-5208.150401502421,-1182.763724925900];
const TPS_N = TPS_PTS.length;

function tpsKernel(r2) {
  if (r2 < 1e-10) return 0;
  return r2 * Math.log(r2) / 2;
}

function gpsToSchematic(lat, lng) {
  let px = TPS_WX[TPS_N] + TPS_WX[TPS_N+1]*lat + TPS_WX[TPS_N+2]*lng;
  let py = TPS_WY[TPS_N] + TPS_WY[TPS_N+1]*lat + TPS_WY[TPS_N+2]*lng;
  for (let i = 0; i < TPS_N; i++) {
    const r2 = (lat - TPS_PTS[i][0])**2 + (lng - TPS_PTS[i][1])**2;
    const k = tpsKernel(r2);
    px += TPS_WX[i] * k;
    py += TPS_WY[i] * k;
  }
  return [px, py];
}

// ── Schematic pan/zoom state ──────────────────────────────────────────────────
let sScale = 0.18, sTx = 0, sTy = 0;
let sDragging = false, sDragStart = null, sTStart = null;

function initSchematic() {
  const panel = document.getElementById('schematic-panel');
  const wrap = document.getElementById('schematic-img-wrap');

  // Initial fit: show most of the map
  const fitScale = Math.min(panel.clientWidth / 2301, panel.clientHeight / 2500) * 0.95;
  sScale = fitScale;
  sTx = (panel.clientWidth - 2301 * sScale) / 2;
  sTy = (panel.clientHeight - 2500 * sScale) / 2;
  applySchematicTransform();

  panel.addEventListener('mousedown', e => {
    sDragging = true;
    sDragStart = { x: e.clientX, y: e.clientY };
    sTStart = { x: sTx, y: sTy };
  });
  window.addEventListener('mousemove', e => {
    if (!sDragging) return;
    sTx = sTStart.x + (e.clientX - sDragStart.x);
    sTy = sTStart.y + (e.clientY - sDragStart.y);
    applySchematicTransform();
  });
  window.addEventListener('mouseup', () => { sDragging = false; });

  // Touch
  let lastTouchDist = null, lastTouchMid = null;
  panel.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      sDragging = true;
      sDragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      sTStart = { x: sTx, y: sTy };
    } else if (e.touches.length === 2) {
      sDragging = false;
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      lastTouchMid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
    }
  }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && sDragging) {
      sTx = sTStart.x + (e.touches[0].clientX - sDragStart.x);
      sTy = sTStart.y + (e.touches[0].clientY - sDragStart.y);
      applySchematicTransform();
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const mid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
      const ratio = dist / lastTouchDist;
      const newScale = Math.max(0.1, Math.min(3, sScale * ratio));
      sTx = mid.x - (mid.x - sTx) * (newScale / sScale);
      sTy = mid.y - (mid.y - sTy) * (newScale / sScale);
      sScale = newScale;
      lastTouchDist = dist;
      lastTouchMid = mid;
      applySchematicTransform();
    }
  }, { passive: true });
  panel.addEventListener('touchend', () => { sDragging = false; lastTouchDist = null; });

  // Wheel zoom
  panel.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = panel.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.85 : 1.18;
    const newScale = Math.max(0.1, Math.min(4, sScale * delta));
    sTx = mx - (mx - sTx) * (newScale / sScale);
    sTy = my - (my - sTy) * (newScale / sScale);
    sScale = newScale;
    applySchematicTransform();
  }, { passive: false });
}

function applySchematicTransform() {
  const wrap = document.getElementById('schematic-img-wrap');
  wrap.style.transform = `translate(${sTx}px,${sTy}px) scale(${sScale})`;
  // Reposition markers
  updateSchematicMarkers();
}

let schematicMarkerEls = {}; // vehicleId → element
let schematicInitDone = false;

function updateSchematicMarkers() {
  if (mapMode !== 'transport') return;
  const container = document.getElementById('schematic-markers');
  // Update positions of existing markers
  Object.entries(schematicMarkerEls).forEach(([id, el]) => {
    const lat = parseFloat(el.dataset.lat);
    const lng = parseFloat(el.dataset.lng);
    const [px, py] = gpsToSchematic(lat, lng);
    el.style.left = px + 'px';
    el.style.top  = py + 'px';
  });
}

function renderSchematicVehicles(vehicles) {
  const container = document.getElementById('schematic-markers');
  if (!container) return;
  const seen = new Set();

  vehicles.forEach(v => {
    const lat = v.lat, lng = v.lng;
    if (!lat || !lng || lat === 0 || lng === 0) return;
    if (lat < -38.2 || lat > -37.5 || lng < 144.5 || lng > 145.5) return;

    // Parse route ID same way as processVehicles
    let routeId = '?';
    if (v.routeId) {
      const m = v.routeId.match(/vic-03-(\w+):?$/);
      routeId = m ? m[1] : String(v.routeId);
    }

    if (!activeRoutes.has(routeId)) return;
    const def = ROUTE_DEFS[routeId];
    if (!def) return;

    const id = v.id || (lat + ',' + lng);
    seen.add(id);

    const [px, py] = gpsToSchematic(lat, lng);
    let el = schematicMarkerEls[id];
    if (!el) {
      el = document.createElement('div');
      el.className = 'schematic-tram';
      el.textContent = routeId;
      el.style.background = def.color;
      el.dataset.routeId = routeId;
      el.dataset.vehicleId = id;
      el.addEventListener('click', () => {
        const speed = v.speed ? (v.speed * 3.6).toFixed(0) : '0';
        showVehicleInfo({ routeId, vehicleLabel: v.vehicleLabel || id, speed, bearing: v.bearing || 0, tripId: v.tripId || '—', lat, lng });
      });
      container.appendChild(el);
      schematicMarkerEls[id] = el;
    }
    el.dataset.lat = lat;
    el.dataset.lng = lng;
    el.style.left = px + 'px';
    el.style.top  = py + 'px';
  });

  // Remove stale markers
  Object.keys(schematicMarkerEls).forEach(id => {
    if (!seen.has(id)) {
      schematicMarkerEls[id].remove();
      delete schematicMarkerEls[id];
    }
  });
}


function setMapMode(mode) {
  mapMode = mode;
  const isSchematic = mode === 'transport';

  document.getElementById('btn-street').classList.toggle('active', !isSchematic);
  document.getElementById('btn-transit').classList.toggle('active', isSchematic);
  document.getElementById('mb-street')?.classList.toggle('active', !isSchematic);
  document.getElementById('mb-transit')?.classList.toggle('active', isSchematic);

  const mapEl = document.getElementById('map');
  const schEl = document.getElementById('schematic-panel');

  if (isSchematic) {
    // Switch to schematic view
    mapEl.style.display = 'none';
    schEl.style.display = 'block';
    if (!schematicInitDone) {
      schematicInitDone = true;
      initSchematic();
    }
    // Re-render vehicles on schematic with latest data
    if (window._lastVehicles) renderSchematicVehicles(window._lastVehicles);
  } else {
    // Switch back to street map
    schEl.style.display = 'none';
    mapEl.style.display = '';
    map.removeLayer(tileBase);
    map.removeLayer(tileLabels);
    tileBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO', subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);
    tileLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19, pane: 'shadowPane',
    }).addTo(map);
    Object.values(routeLayers).forEach(l => { if (l.line) l.line.setStyle({ weight: 4, opacity: 1 }); });
    tileLabels.bringToFront();
    map.invalidateSize();
  }
}

// ── Load network data then draw ──────────────────────────────────────────────
async function loadAndDrawRoutes() {
  try {
    const res = await fetch('tram_network.json');
    TRAM_NETWORK = await res.json();
    drawRouteLines();
    drawStopDots();
  } catch(e) {
    console.warn('Could not load tram_network.json:', e);
  }
}

function drawRouteLines() {
  if (!TRAM_NETWORK) return;
  Object.entries(TRAM_NETWORK.routes).forEach(([id, segments]) => {
    const def = ROUTE_DEFS[id];
    if (!def) return;

    // White casing for contrast on both dark and light maps
    const casing = L.polyline(segments, {
      color: '#fff', weight: 8, opacity: 0.3,
      lineJoin: 'round', lineCap: 'round',
    });

    const line = L.polyline(segments, {
      color: def.color, weight: 4, opacity: 1,
      lineJoin: 'round', lineCap: 'round',
    });
    line.bindTooltip('Route ' + id + ' — ' + def.name, { sticky: true });

    // Only add to map if this route is currently active
    if (activeRoutes.has(id)) {
      casing.addTo(map);
      line.addTo(map);
    }

    routeLayers[id] = { line, casing, dots: [] };
  });
}

// Stop markers keyed by stop ID for per-route visibility
let stopMarkers = {}; // stopId -> { marker, routes[] }

function drawStopDots() {
  if (!TRAM_NETWORK) return;
  TRAM_NETWORK.stops.forEach((stop, idx) => {
    const routes = stop.r || [];
    const marker = L.circleMarker(stop.p, {
      radius: 3, color: '#fff', weight: 1.5,
      fillColor: '#64748b', fillOpacity: 1,
    }).bindTooltip(stop.n, { sticky: true, direction: 'top' });
    // Show if at least one of this stop's routes is currently active
    if (routes.some(r => activeRoutes.has(r))) {
      marker.addTo(map);
    }
    // Use index as key to avoid any ID collision issues
    stopMarkers[idx] = { marker, routes };
  });
}

function updateStopVisibility() {
  Object.values(stopMarkers).forEach(({ marker, routes }) => {
    const shouldShow = routes.some(r => activeRoutes.has(r));
    if (shouldShow) marker.addTo(map);
    else map.removeLayer(marker);
  });
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('route-list');
  const pills = document.getElementById('mobile-pills');
  list.innerHTML = ''; pills.innerHTML = '';

  GROUPS.forEach(group => {
    const routes = Object.entries(ROUTE_DEFS).filter(([,d]) => d.group === group);
    if (!routes.length) return;

    const header = document.createElement('div');
    header.className = 'route-group-header';
    header.textContent = group;
    list.appendChild(header);

    routes.forEach(([id, def]) => {
      const item = document.createElement('div');
      item.className = 'route-item' + (activeRoutes.has(id) ? '' : ' dimmed');
      item.id = 'route-item-' + id;
      item.style.setProperty('--color', def.color);
      item.innerHTML = `
        <div class="route-toggle" title="Toggle route ${id}"></div>
        <div class="route-num" style="background:${def.color}">${id}</div>
        <div class="route-name">${def.name}</div>
        <div class="route-tram-count" id="rc-${id}">0</div>
      `;
      item.addEventListener('click', () => toggleRoute(id));
      list.appendChild(item);

      // Mobile pill
      const pill = document.createElement('div');
      pill.className = 'mobile-pill' + (activeRoutes.has(id) ? '' : ' dimmed');
      pill.id = 'pill-' + id;
      pill.style.background = def.color;
      pill.textContent = id;
      pill.addEventListener('click', () => toggleRoute(id));
      pills.appendChild(pill);
    });
  });
}

function setAllRoutes(on) {
  Object.keys(ROUTE_DEFS).forEach(id => {
    if (on !== activeRoutes.has(id)) toggleRoute(id);
  });
  saveRoutes();
}

function toggleRoute(id) {
  if (activeRoutes.has(id)) activeRoutes.delete(id);
  else activeRoutes.add(id);
  saveRoutes();

  const on = activeRoutes.has(id);
  document.getElementById('route-item-' + id)?.classList.toggle('dimmed', !on);
  document.getElementById('pill-' + id)?.classList.toggle('dimmed', !on);

  // Show/hide tram markers
  Object.values(markers).forEach(m => {
    if (m.routeId === id) {
      if (on) m.marker.addTo(map);
      else m.marker.remove();
    }
  });

  // Show/hide route line + stop dots
  if (routeLayers[id]) {
    const { line, casing, dots } = routeLayers[id];
    if (on) {
      casing.addTo(map); line.addTo(map);
      dots.forEach(d => d.addTo(map));
    } else {
      map.removeLayer(casing); map.removeLayer(line);
      dots.forEach(d => map.removeLayer(d));
    }
  }

  updateTramCount();
  updateStopVisibility();
  // Sync schematic marker visibility
  Object.entries(schematicMarkerEls).forEach(([vid, el]) => {
    el.style.display = activeRoutes.has(el.dataset.routeId) ? '' : 'none';
  });
}

// ── Fetch trams from Worker ────────────────────────────────────────────────

async function fetchTrams() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Loading…';
  btn.style.opacity = '0.6';

  try {
    const r = await fetch(WORKER_URL);
    if (!r.ok) throw new Error('Worker returned HTTP ' + r.status);
    const json = await r.json();
    if (json.error) throw new Error(json.error);
    const vehicles = json.vehicles || [];

    window._lastVehicles = vehicles;
    processVehicles(vehicles);
    if (mapMode === 'transport') renderSchematicVehicles(vehicles);
    setStatus('live', vehicles.length + ' vehicles');
    document.getElementById('error-banner').style.display = 'none';

    const now = new Date();
    document.getElementById('last-updated').textContent =
      'Updated ' + now.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  } catch (err) {
    console.error('Fetch error:', err);
    setStatus('error', 'Connection error');
    const eb = document.getElementById('error-banner');
    eb.style.display = 'block';
    eb.textContent = `⚠ Could not fetch live data: ${err.message}. Retrying in 60s…`;
  } finally {
    btn.textContent = '↻ Refresh';
    btn.style.opacity = '1';
  }
}

function processVehicles(vehicles) {
  const counts = {};
  const seen = new Set();

  vehicles.forEach(v => {
    const lat = v.lat, lng = v.lng;
    if (!lat || !lng || lat === 0 || lng === 0) return;
    if (lat < -38.2 || lat > -37.5 || lng < 144.5 || lng > 145.5) return;

    const id = v.id || (lat + ',' + lng);
    // Route IDs come as "aus:vic:vic-03-75:" — extract just the number
    let routeId = '?';
    if (v.routeId) {
      const m = v.routeId.match(/vic-03-(\w+):?$/);
      routeId = m ? m[1] : String(v.routeId);
    }
    const vehicleId = v.vehicleLabel || id;
    const speed = v.speed ? (v.speed * 3.6).toFixed(0) : '0';
    const bearing = v.bearing || 0;
    const tripId = v.tripId || '—';

    seen.add(id);
    counts[routeId] = (counts[routeId] || 0) + 1;

    const def = ROUTE_DEFS[routeId] || { color: '#888', name: 'Route ' + routeId };
    const isVisible = activeRoutes.has(routeId) || !ROUTE_DEFS[routeId];

    if (markers[id]) {
      markers[id].marker.setLatLng([lat, lng]);
      markers[id].data = { routeId, vehicleId, speed, bearing, tripId, lat, lng };
    } else {
      const icon = L.divIcon({
        className: '',
        html: '<div class="tram-marker" id="vm-' + id + '" style="background:' + def.color + ';width:26px;height:18px;">' + routeId + '</div>',
        iconSize: [26, 18],
        iconAnchor: [13, 9],
      });
      const marker = L.marker([lat, lng], { icon, zIndexOffset: 100 });
      marker.on('click', () => showInfo(id));
      if (isVisible) marker.addTo(map);
      markers[id] = { marker, routeId, data: { routeId, vehicleId, speed, bearing, tripId, lat, lng } };
    }

    const el = document.getElementById('vm-' + id);
    if (el) el.style.background = def.color;
  });

  // Remove stale markers
  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) { markers[id].marker.remove(); delete markers[id]; }
  });

  Object.keys(ROUTE_DEFS).forEach(id => {
    const el = document.getElementById('rc-' + id);
    if (el) el.textContent = counts[id] || 0;
  });

  updateTramCount();
}

function updateTramCount() {
  const visible = Object.values(markers).filter(m => activeRoutes.has(m.routeId)).length;
  document.getElementById('tram-count-badge').textContent = `${visible} trams`;
  document.getElementById('mobile-tram-count').textContent = `${visible} trams`;
}

function showInfo(vehicleId) {
  const m = markers[vehicleId];
  if (!m) return;
  const d = m.data;
  const def = ROUTE_DEFS[d.routeId] || { color: '#888', name: 'Unknown route' };

  selectedVehicle = vehicleId;
  document.querySelectorAll('.tram-marker').forEach(el => el.classList.remove('selected'));
  document.getElementById('vm-' + vehicleId)?.classList.add('selected');

  document.getElementById('info-content').innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:12px;">
      <span class="info-route-badge" style="background:${def.color}">${d.routeId}</span>
      <span style="font-size:13px;font-weight:600;">${def.name}</span>
    </div>
    <div class="info-row"><span class="info-label">Vehicle</span><span class="info-value" style="font-family:var(--font-mono)">${d.vehicleId}</span></div>
    <div class="info-row"><span class="info-label">Speed</span><span class="info-value" style="font-family:var(--font-mono)">${d.speed} km/h</span></div>
    <div class="info-row"><span class="info-label">Bearing</span><span class="info-value" style="font-family:var(--font-mono)">${Math.round(d.bearing)}°</span></div>
    <div class="info-row"><span class="info-label">Position</span><span class="info-value" style="font-family:var(--font-mono);font-size:11px;">${d.lat.toFixed(5)}, ${d.lng.toFixed(5)}</span></div>
  `;

  document.getElementById('info-panel').classList.add('visible');
  map.panTo([d.lat, d.lng], { animate: true });
}

function closeInfo() {
  document.getElementById('info-panel').classList.remove('visible');
  document.querySelectorAll('.tram-marker').forEach(el => el.classList.remove('selected'));
  selectedVehicle = null;
}

function setStatus(state, text) {
  const badge = document.getElementById('live-badge');
  const dot = badge.querySelector('.pulse');
  const span = document.getElementById('status-text');
  span.textContent = text;
  if (state === 'live') { dot.style.background = 'var(--green)'; }
  else if (state === 'error') { dot.style.background = 'var(--red)'; }
  else { dot.style.background = 'var(--amber)'; }
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  buildSidebar();
  fetchTrams();
  setInterval(updateClock, 1000);
  setInterval(fetchTrams, 30000);
  updateClock();
});
</script>
